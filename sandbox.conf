# sandbox.conf — single source of truth for the SandBox toolkit.
#
# Sourced by cape-deploy.sh, netiso.sh, smoketest.sh (as shell) and read by
# capevm.py (as KEY=value). Edit THIS file; every script falls back to its own
# built-in defaults if a value here is absent, so partial configs are fine.
#
# Format rules (so the Python reader stays happy):
#   * KEY="value"  — simple scalars, quoted.
#   * VM_LIST=(...) — the one bash array; capevm.py ignores it.
#   * '#' comments and blank lines are ignored.

# --- Host / CAPE ---
CAPE_USER="cape"
CAPE_ROOT="/opt/CAPEv2"
CAPE_GIT="https://github.com/kevoreilly/CAPEv2.git"
USE_UV="false"
DB_PASSWORD="ChangeMe_SuperSecret"
MONGO_ENABLE="1"

# --- Networking (keep internally consistent) ---
NETWORK_IFACE="virbr0"                 # interface CAPE sniffs / binds near
VM_BRIDGE="virbr0"                     # bridge guests attach to (usually == NETWORK_IFACE)
ANALYSIS_SUBNET="192.168.122.0/24"     # the analysis network CIDR
RESULTSERVER_IP="192.168.122.1"        # host IP guests call back to
RESULTSERVER_PORT="2042"               # CAPE result server port
WEB_PORT="8000"                        # cape-web (uwsgi) port

# --- Guest build (capevm.py) ---
INSTALL_ISO="/opt/iso/win10x64.iso"        # Windows install ISO
PYTHON_INSTALLER="/opt/iso/python-3.x.x-x86.exe"   # 32-bit Python for the guest
AGENT_PY="/opt/CAPEv2/agent/agent.py"      # CAPE agent (present after install)
CLOUD_IMAGE=""                             # base qcow2 cloud image for linux guests
VM_CPUS="4"
VM_RAM_MB="8192"
VM_DISK_GB="120"
BUILD_TIMEOUT_MIN="60"

# --- Network isolation (netiso.sh) ---
ISO_MODE="isolated"                    # isolated | simulated | gateway
GATEWAY_IFACE="tun0"                   # uplink for ISO_MODE=gateway (VPN/Tor)
FAKENET_IP="192.168.122.1"             # INetSim/FakeNet host for ISO_MODE=simulated
ALLOW_DHCP_DNS="1"                     # 0 to go fully dark (no DNS to host dnsmasq)

# --- Smoke test (smoketest.sh) ---
CAPE_API_TOKEN=""                      # set if your apiv2 requires a token

# --- Self-signed HTTPS for the web UI (cape-deploy.sh tls stage / --tls) ---
ENABLE_TLS="0"                         # 1 runs the tls stage during 'all' (or pass --tls)
TLS_SERVER_NAME="cape.local"           # CN/SAN + nginx server_name
TLS_CERT="/etc/ssl/certs/cape-selfsigned.crt"
TLS_KEY="/etc/ssl/private/cape-selfsigned.key"
TLS_DAYS="825"
TLS_REDIRECT_HTTP="1"                  # redirect :80 -> :443

# --- Anti-detection identity ---
SMBIOS_PROFILE="dell"                  # dell | lenovo (used if no DMI clone)
REFERENCE_DMI=""                       # saved `dmidecode` dump to clone; empty = preset
DMI_PROFILE="/opt/capevm/work/dmi-profile.json"
DMI_KEEP_SERIALS="0"                   # 1 = clone exact serials (else regen per VM)
REALISTIC_HW="0"                       # 1 = real CPU topology (sockets/cores/threads) + DIMM vendor strings
DECOY="1"                              # 1 = seed lived-in user artifacts in Windows guests
DECOY_FILL_MB="0"                      # filler MB so guest free-space ratio looks used (0=off)

# --- Watchdog (watchdog.sh) ---
WATCHDOG_DISK_PCT="90"                 # warn/act when / exceeds this %
WATCHDOG_STUCK_MIN="120"               # an analysis running longer than this is "stuck"
WATCHDOG_RETENTION_DAYS="30"           # delete analyses older than this (0 = never)

# --- VM inventory:  name|ip|snapshot|tags[|platform]   (platform: windows|linux)
# The 5th field is optional and defaults to windows. Linux guests need CLOUD_IMAGE.
VM_LIST=(
  "win10x64_1|192.168.122.101|clean|x64,win10"
  # "ubuntu22_1|192.168.122.150|clean|x64,ubuntu|linux"
)
